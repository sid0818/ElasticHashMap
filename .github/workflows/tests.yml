name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Also run the large-scale (million-entry) stress tests"
        type: boolean
        default: false

jobs:
  fast-tests:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run fast test suite
        run: pytest tests/ -v -m "not slow"

  slow-tests:
    name: Large-scale stress tests (manual trigger only)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_slow == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run large-scale stress tests
        run: pytest tests/test_large_scale.py -m slow --run-slow -v -s
